# =============================================================================
# .github/workflows/_ship.yml — TheDevs shared "ship" workflow (thin orchestrator).
# =============================================================================
# The one-line entrypoint every app uses. It composes two reusable halves:
#   1. _build.yml   — build the image + push to GHCR (customisable: build args,
#                     cache, target, build secrets). Holds `packages:write`.
#   2. _deploy.yml  — HMAC-trigger the box deploy and (optionally) WAIT for the
#                     real result + logs. Holds ONLY `DEPLOY_WEBHOOK_SECRET`.
#
# Splitting build from deploy keeps the security-critical deploy signer in one tiny
# file with NO build token, lets the build be customised per app without touching
# the signer, and gives a deploy-only entrypoint (_deploy.yml) for re-deploys.
#
# The caller surface is BACKWARD-COMPATIBLE: every input below is optional except
# `app`, and defaults reproduce the original behavior. Existing `_ship.yml@v1`
# callers keep working unchanged. See README.md for examples.
# =============================================================================

name: ship

on:
  workflow_call:
    inputs:
      # ---- identity / deploy ----
      app:
        description: App id == hook id == apps/<app>/ on the box == GHCR image name.
        required: true
        type: string
      image:
        description: Fully-qualified GHCR image (lowercase). Default ghcr.io/<owner>/<repo>.
        required: false
        type: string
        default: ghcr.io/${{ github.repository }}
      deploy_host:
        description: Server FQDN; the webhook vhost is deploy.<deploy_host>.
        required: false
        type: string
        default: lily.srv.thedevs.cz
      deploy_tag:
        description: Image tag to deploy (default "main"). Ignored when deploy_sha=true.
        required: false
        type: string
        default: main
      deploy_sha:
        description: >-
          Deploy the IMMUTABLE sha-<git-sha> tag this build pushed instead of "main"
          (re-runnable, exact). One-line opt-in to immutable deploys.
        required: false
        type: boolean
        default: false
      await_deploy:
        description: >-
          Wait for the real deploy result and fail this run unless the deploy finished
          OK (fail-closed; status + redacted logs surface here and in the Checks tab).
          DEFAULT true. Requires the box D27 executor + a per-app checks:write token,
          else the run times out red. Set false for fire-and-forget (green on QUEUED).
        required: false
        type: boolean
        default: true
      await_timeout_seconds:
        description: Max seconds to await the deploy result before failing red. Default 300 (5 min); raise for slow/queued deploys.
        required: false
        type: number
        default: 300
      # ---- build customisation ----
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
      dockerfile:
        description: Path to the Dockerfile (relative to context).
        required: false
        type: string
        default: Dockerfile
      platforms:
        description: Target platform(s). The box is amd64-only.
        required: false
        type: string
        default: linux/amd64
      target:
        description: Optional multi-stage build target.
        required: false
        type: string
        default: ''
      build_args:
        description: Newline-separated KEY=VALUE build args (NON-SECRET; e.g. APP_VERSION=...).
        required: false
        type: string
        default: ''
      cache:
        description: Enable per-image GitHub Actions layer cache. Default true.
        required: false
        type: boolean
        default: true
      provenance:
        description: Emit SLSA provenance. Default true.
        required: false
        type: boolean
        default: true
    secrets:
      DEPLOY_WEBHOOK_SECRET:
        description: Per-app HMAC deploy secret (passed only to _deploy.yml).
        required: true
      BUILD_SECRETS:
        description: Optional BuildKit secret mounts (passed only to _build.yml).
        required: false

jobs:
  build:
    # Full ref (not ./) — a reusable workflow invoked cross-repo must reference nested
    # reusable workflows by owner/repo@ref. Keep @v1 in lockstep with this file's tag.
    uses: TheDevs-cz/ci/.github/workflows/_build.yml@v1
    permissions:
      contents: read
      packages: write
    with:
      image: ${{ inputs.image }}
      context: ${{ inputs.context }}
      dockerfile: ${{ inputs.dockerfile }}
      platforms: ${{ inputs.platforms }}
      target: ${{ inputs.target }}
      build_args: ${{ inputs.build_args }}
      cache: ${{ inputs.cache }}
      provenance: ${{ inputs.provenance }}
    secrets:
      # GHCR token is provided automatically to _build.yml; the deploy secret is
      # deliberately NOT passed here.
      BUILD_SECRETS: ${{ secrets.BUILD_SECRETS }}

  deploy:
    needs: build
    uses: TheDevs-cz/ci/.github/workflows/_deploy.yml@v1
    # Permissions inherited from the caller (NOT declared): await needs checks:read,
    # which only awaiting callers grant — declaring it here breaks non-await callers.
    with:
      app: ${{ inputs.app }}
      deploy_host: ${{ inputs.deploy_host }}
      # Immutable sha tag (from the build) when deploy_sha=true, else the branch tag.
      deploy_tag: ${{ inputs.deploy_sha && needs.build.outputs.sha_tag || inputs.deploy_tag }}
      await_deploy: ${{ inputs.await_deploy }}
      await_timeout_seconds: ${{ inputs.await_timeout_seconds }}
    secrets:
      DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
