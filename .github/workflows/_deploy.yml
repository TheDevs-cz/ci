# =============================================================================
# .github/workflows/_deploy.yml — TheDevs shared, reusable DEPLOY-TRIGGER workflow.
# =============================================================================
# The SECURITY-CRITICAL half of the old _ship.yml, isolated in its own tiny file:
#   1. Fire an HMAC-signed deploy trigger at the box's webhook receiver.
#   2. (optional) WAIT for the real deploy result + logs via the GitHub Checks API
#      and turn THIS run red/green accordingly.
#
# This job holds ONLY `DEPLOY_WEBHOOK_SECRET` (never the GHCR token) and only
# `contents:read` + `checks:read`. The privilege split from _build.yml is the point.
#
# HANDSHAKE CONTRACT (every file in the system agrees — do not drift):
#   endpoint : https://deploy.<deploy_host>/hooks/<app>   (hook id == app name)
#   auth     : HMAC-SHA256 over the RAW request body
#   header   : X-Hub-Signature-256: sha256=<hexdigest>
#   body     : {"app":"<app>","tag":"<tag>","job_id":"<32hex>","head_sha":"<40hex>","nonce":"<32hex>"}
#              (compact, no spaces; bytes signed == bytes sent)
#   marker   : receiver returns "QUEUED <app> <tag>" iff the HMAC passed and the
#              job was spooled (a bad HMAC returns 200 with NO marker → still fails)
#
# RESULT FEEDBACK (await_deploy):
#   The box's ROOT executor creates a GitHub check-run named "deploy" on <head_sha>
#   with external_id == <nonce>, updates it with the (redacted) deploy log, and sets
#   conclusion=success|failure. We poll for OUR nonce on OUR sha → no cross-talk with
#   concurrent runs / retries. Absence of a success conclusion is ALWAYS a failure
#   (fail-closed). The check is created on the box side; this workflow only READS it.
#
# CONCURRENCY (one deploy at a time, never mid-job cancel):
#   group deploy-<app>-<host>, cancel-in-progress:false → an in-progress deploy
#   ALWAYS finishes; a newer push queues as `pending`; a still-newer push replaces
#   the pending one (the box's flock is the global backstop across all apps).
# =============================================================================

name: deploy

on:
  workflow_call:
    inputs:
      app:
        description: App id == hook id == apps/<app>/ on the box == GHCR image name.
        required: true
        type: string
      deploy_host:
        description: Server FQDN; the webhook vhost is deploy.<deploy_host>.
        required: false
        type: string
        default: lily.srv.thedevs.cz
      deploy_tag:
        description: Image tag to deploy (sent to the receiver). Default "main".
        required: false
        type: string
        default: main
      await_deploy:
        description: >-
          WAIT for the box to report the real deploy result via a GitHub check-run and
          fail this run unless the deploy actually finished successfully (fail-closed).
          DEFAULT true — a green run means a real, successful deploy, not merely
          "enqueued". REQUIRES the deploy host to run the D27 executor AND a per-app
          checks:write token in /srv/deploy/checks.env; without them the run times out
          red. Set false for fire-and-forget (green as soon as the trigger is QUEUED).
        required: false
        type: boolean
        default: true
      await_timeout_seconds:
        description: >-
          Max seconds to wait for the deploy result. MUST exceed the box executor
          timeout (1800s) PLUS worst-case queue wait behind other apps (one
          serialized executor). Default 2700s.
        required: false
        type: number
        default: 2700
    secrets:
      DEPLOY_WEBHOOK_SECRET:
        description: Per-app HMAC secret shared ONLY with this app's hook on the box.
        required: true

jobs:
  deploy:
    name: trigger deploy${{ inputs.await_deploy && ' & await result' || '' }}
    runs-on: ubuntu-latest
    # Permissions are INHERITED from the caller (intentionally NOT declared here): a
    # reusable job cannot request a scope the caller did not grant, and `await_deploy`
    # needs `checks: read` which ONLY awaiting callers grant — declaring it here would
    # make every non-awaiting caller fail at startup. See README (the await example
    # adds `checks: read` at the caller level).
    # One deploy at a time per (app, host). cancel-in-progress:false ⇒ a running
    # deploy is NEVER cancelled mid-flight; new pushes queue and the newest pending
    # wins. See the header for the full rationale.
    concurrency:
      group: deploy-${{ inputs.app }}-${{ inputs.deploy_host }}
      cancel-in-progress: false
    steps:
      # ---- 1. fire the HMAC-signed deploy trigger ---------------------------
      - name: Trigger deploy (HMAC)
        id: trigger
        env:
          APP: ${{ inputs.app }}
          DEPLOY_HOST: ${{ inputs.deploy_host }}
          DEPLOY_TAG: ${{ inputs.deploy_tag }}
          HEAD_SHA: ${{ github.sha }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          tag="${DEPLOY_TAG}"
          # Defence in depth: the SAME whitelist the receiver + executor enforce.
          if ! printf '%s' "$tag" | grep -Eq '^[A-Za-z0-9._-]{1,128}$'; then
            echo "::error::computed tag '$tag' fails the whitelist regex"; exit 1
          fi

          # Per-RUN correlation ids: job_id (this trigger) + nonce (matches the
          # check-run). Fresh every run so retries / concurrent runs never collide.
          job_id="$(openssl rand -hex 16)"   # 32 hex
          nonce="$(openssl rand -hex 16)"     # 32 hex
          head_sha="${HEAD_SHA}"              # 40 hex (the commit the check attaches to)

          # Compact JSON body — bytes signed == bytes sent (no trailing newline).
          body="$(printf '{"app":"%s","tag":"%s","job_id":"%s","head_sha":"%s","nonce":"%s"}' \
            "$APP" "$tag" "$job_id" "$head_sha" "$nonce")"

          sig="$(printf '%s' "$body" \
            | openssl dgst -sha256 -hmac "$DEPLOY_WEBHOOK_SECRET" | awk '{print $NF}')"

          url="https://deploy.${DEPLOY_HOST}/hooks/${APP}"
          echo "POST ${url}  (app=${APP} tag=${tag} sha=${head_sha} — signature redacted)"

          # --fail-with-body: print the receiver response AND fail on non-2xx. We
          # ALSO require the "QUEUED <app>" marker: a bad/missing HMAC returns 200
          # "Hook rules were not satisfied" (running NOTHING), so a status check
          # alone would let a REJECTED deploy look like success.
          http_body="$(curl --fail-with-body -sS \
            -X POST "$url" \
            -H 'Content-Type: application/json' \
            -H "X-Hub-Signature-256: sha256=${sig}" \
            -d "$body")"
          echo "receiver response: ${http_body}"
          case "$http_body" in
            *"QUEUED ${APP}"*) echo "deploy trigger accepted for ${APP} @ ${tag}" ;;
            *) echo "::error::deploy NOT enqueued (no success marker — HMAC rejected or receiver error)"; exit 1 ;;
          esac

          {
            echo "nonce=${nonce}"
            echo "job_id=${job_id}"
            echo "head_sha=${head_sha}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"

      # ---- 2. await the real deploy result ----------------------------------
      # The box posts a COMMIT STATUS (context="deploy") on OUR sha: `pending` while it
      # runs, then `success`/`failure`. We poll the newest "deploy" status and turn THIS
      # run red/green accordingly — so the pipeline reflects the ACTUAL deploy outcome.
      # Fail-closed: no terminal status by the deadline ⇒ red. (Full deploy logs live
      # box-side: Grafana app="deploy" / journalctl -u lily-deploy-runner.) The `deploy`
      # status also shows natively on the commit/PR.
      - name: Await deploy result
        if: ${{ inputs.await_deploy }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.trigger.outputs.head_sha }}
          TIMEOUT_S: ${{ inputs.await_timeout_seconds }}
        run: |
          set -euo pipefail
          # await_timeout_seconds is a number input; coerce to a positive integer so a
          # fractional literal can't crash bash arithmetic below.
          TIMEOUT_S="${TIMEOUT_S%.*}"
          case "$TIMEOUT_S" in ''|*[!0-9]*) echo '::error::await_timeout_seconds must be a positive integer'; exit 1 ;; esac
          deadline=$(( $(date +%s) + TIMEOUT_S ))
          api="repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/statuses?per_page=100"
          echo "Waiting for the box to report the deploy result (sha=${HEAD_SHA}, context=deploy, timeout=${TIMEOUT_S}s)..."

          while :; do
            # Newest 'deploy' commit status for THIS sha (the API returns newest-first).
            json="$(gh api -H 'Accept: application/vnd.github+json' "$api" 2>/dev/null || echo '[]')"
            state="$(printf '%s' "$json" | jq -r 'map(select(.context=="deploy")) | (first.state // "none")' 2>/dev/null || echo none)"
            desc="$(printf '%s'  "$json" | jq -r 'map(select(.context=="deploy")) | (first.description // "")' 2>/dev/null || echo '')"
            case "$state" in
              success)        echo "deploy succeeded - ${desc}"; exit 0 ;;
              failure|error)  echo "::error::deploy ${state} - ${desc}"; exit 1 ;;
              pending)        echo "deploy in progress... ${desc}" ;;
              *)              echo "waiting for the box to post a deploy status..." ;;
            esac
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::timed out after ${TIMEOUT_S}s - no terminal deploy status on ${HEAD_SHA}."
              echo "::error::The box may be queued behind other deploys, down, or missing its checks token."
              exit 1
            fi
            sleep 10
          done
